name: CI

on:
  pull_request:
  push:
    branches:
      - develop
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  content-policy:
    name: content-policy
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0
      - name: Reject prohibited vendor/model references
        id: content_policy
        shell: bash
        run: |
          set +e
          first_term="Anthro""pic"
          second_term="Clau""de"
          output="$(
            set -euo pipefail
            violations=0
            for term in "$first_term" "$second_term"; do
              matches="$(git grep -n -I -i -F -- "$term" -- . || true)"
              if [ -n "$matches" ]; then
                echo "Tracked file content contains prohibited keyword: $term"
                echo "$matches"
                violations=1
              fi
            done

            if [ "${{ github.event_name }}" = "pull_request" ]; then
              base="${{ github.event.pull_request.base.sha }}"
              head="${{ github.event.pull_request.head.sha }}"
            else
              base="${{ github.event.before }}"
              head="${{ github.sha }}"
            fi

            if [ -n "$base" ] && [ "$base" != "0000000000000000000000000000000000000000" ] && git cat-file -e "$base^{commit}" 2>/dev/null; then
              messages="$(git log --format=%B "$base..$head")"
            else
              messages="$(git log --format=%B -n 1 "$head")"
            fi

            for term in "$first_term" "$second_term"; do
              if grep -qiF -- "$term" <<< "$messages"; then
                echo "Commit message contains prohibited keyword: $term"
                violations=1
              fi
            done

            exit "$violations"
          )"
          status="$?"
          {
            echo "output<<EOF"
            echo "$output"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"
          echo "$output"
          exit "$status"
      - name: Close prohibited-content PR
        if: failure() && github.event_name == 'pull_request'
        env:
          GH_TOKEN: ${{ github.token }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          POLICY_OUTPUT: ${{ steps.content_policy.outputs.output }}
        shell: bash
        run: |
          set -euo pipefail
          {
            echo "This PR was closed automatically because it violates the repository content policy."
            echo
            echo "Prohibited vendor/model references are not accepted in code or commit messages."
            echo
            echo '```text'
            printf '%s\n' "$POLICY_OUTPUT"
            echo '```'
          } > content-policy-comment.md
          gh pr comment "$PR_NUMBER" --repo "$GITHUB_REPOSITORY" --body-file content-policy-comment.md
          gh pr close "$PR_NUMBER" --repo "$GITHUB_REPOSITORY"

  changes:
    name: changes
    runs-on: ubuntu-latest
    outputs:
      docs_only: ${{ steps.filter.outputs.docs_only }}
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0
          ref: ${{ github.event.pull_request.head.sha || github.sha }}
      - name: Detect docs-only changes
        id: filter
        shell: bash
        run: |
          set -euo pipefail
          if [[ "${{ github.event_name }}" != "pull_request" ]]; then
            echo "docs_only=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          git fetch --no-tags --depth=1 origin "${{ github.base_ref }}"
          changed="$(git diff --name-only "origin/${{ github.base_ref }}"...HEAD)"
          if [[ -n "$changed" ]] && ! grep -Ev '^(README\.md|CONTRIBUTING\.md|LICENSE|doc/|docs/|assets/.*\.(svg|png|jpg|jpeg|webp))$' <<< "$changed" >/dev/null; then
            echo "docs_only=true" >> "$GITHUB_OUTPUT"
          else
            echo "docs_only=false" >> "$GITHUB_OUTPUT"
          fi

  commit-policy:
    name: commit-policy
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0
          ref: ${{ github.event.pull_request.head.sha }}
      - name: Enforce conventional commit and single-commit PRs
        shell: bash
        run: |
          set -euo pipefail
          count="$(git rev-list --count "origin/${{ github.base_ref }}"...HEAD)"
          if [[ "$count" -ne 1 ]]; then
            echo "PR must contain exactly one commit before review; found $count."
            exit 1
          fi
          subject="$(git log -1 --pretty=%s)"
          if [[ ! "$subject" =~ ^(feat|fix|docs|chore|test|refactor|perf|ci|build)(\([a-z0-9._-]+\))?:\ .+ ]]; then
            echo "Commit subject is not Conventional Commits style: $subject"
            exit 1
          fi

  build-test:
    name: build-test
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.docs_only != 'true'
    steps:
      - name: Checkout
        uses: actions/checkout@v5
      - name: Setup Deno
        uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x
      - name: Check formatting
        run: deno task format:check
      - name: Content policy
        run: deno task content-policy
      - name: Lint
        run: deno lint
      - name: Typecheck
        run: deno task typecheck
      - name: Test
        run: deno task test
      - name: Coverage
        run: deno task coverage
      - name: Build
        run: deno task build
      - name: Prepare Rust artifact packages
        env:
          GH_TOKEN: ${{ github.token }}
        run: deno task artifacts:prepare
      - name: Package entrypoint smoke
        run: deno task package-check
      - name: SDK command smoke
        shell: bash
        run: |
          set -euo pipefail
          deno task manifest >/tmp/nnrp-js-manifest.json
          deno task conformance:backend >/tmp/nnrp-js-conformance-backend.json
          deno task conformance:browser >/tmp/nnrp-js-conformance-browser.json
          deno task benchmark:backend >/tmp/nnrp-js-benchmark-backend.json
          deno task benchmark:browser >/tmp/nnrp-js-benchmark-browser.json
          deno task benchmark:smoke

  runtime-policy:
    name: runtime-policy
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      - name: Checkout
        uses: actions/checkout@v5
      - name: Setup Deno
        uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x
      - name: Reject unsupported runtime adapters
        id: runtime_policy
        shell: bash
        run: |
          set +e
          output="$(deno task runtime-policy 2>&1)"
          status="$?"
          {
            echo "status=$status"
            echo "output<<EOF"
            echo "$output"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"
          echo "$output"
          exit "$status"
      - name: Close unsupported runtime PR
        if: failure() && github.event_name == 'pull_request'
        env:
          GH_TOKEN: ${{ github.token }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          POLICY_OUTPUT: ${{ steps.runtime_policy.outputs.output }}
        shell: bash
        run: |
          set -euo pipefail
          {
            echo "This PR was closed automatically because it violates the JS runtime policy."
            echo
            echo "Unsupported runtime/tooling/adaptation entries are not accepted in this repository."
            echo
            echo '```text'
            printf '%s\n' "$POLICY_OUTPUT"
            echo '```'
          } > runtime-policy-comment.md
          gh pr comment "$PR_NUMBER" --repo "$GITHUB_REPOSITORY" --body-file runtime-policy-comment.md
          gh pr close "$PR_NUMBER" --repo "$GITHUB_REPOSITORY"

  docs-only:
    name: docs-only
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.docs_only == 'true'
    steps:
      - name: Acknowledge docs-only change
        run: echo "Docs-only change; build-test skipped."

  required-checks:
    name: required-checks
    runs-on: ubuntu-latest
    needs:
      - content-policy
      - changes
      - build-test
      - docs-only
      - runtime-policy
    if: always()
    steps:
      - name: Verify required checks
        shell: bash
        run: |
          set -euo pipefail
          content_policy="${{ needs.content-policy.result }}"
          build="${{ needs.build-test.result }}"
          docs="${{ needs.docs-only.result }}"
          runtime_policy="${{ needs.runtime-policy.result }}"
          if [[ "$content_policy" != "success" ]]; then
            echo "content-policy did not pass: $content_policy"
            exit 1
          fi
          if [[ "$runtime_policy" != "success" ]]; then
            echo "runtime-policy did not pass: $runtime_policy"
            exit 1
          fi
          if [[ "$build" == "success" || "$docs" == "success" ]]; then
            exit 0
          fi
          echo "Neither build-test nor docs-only succeeded."
          exit 1
